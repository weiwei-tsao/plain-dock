<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlainDock</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom scrollbar for minimalist look */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }
    
    body {
      background-color: #000;
      color: #fff;
    }

    /* Tiptap Editor Styling */
    .ProseMirror {
      outline: none;
      min-height: 400px;
      color: #d1d1d1;
    }
    .ProseMirror p { margin-bottom: 1em; }
    .ProseMirror strong { font-weight: bold; color: #fff; }
    .ProseMirror em { font-style: italic; }
    .ProseMirror u { text-decoration: underline; }
    .ProseMirror code { 
      background: #1a1a1a; 
      padding: 0.2rem 0.4rem; 
      border-radius: 4px; 
      font-family: monospace; 
      color: #a78bfa;
    }
    .ProseMirror pre {
      background: #0f0f0f;
      color: #e2e8f0;
      padding: 1rem;
      border-radius: 8px;
      margin: 1rem 0;
      overflow-x: auto;
      font-family: monospace;
    }
    .ProseMirror h1 { font-size: 1.875rem; font-weight: bold; margin-bottom: 0.5em; color: #fff; }
    .ProseMirror h2 { font-size: 1.5rem; font-weight: bold; margin-bottom: 0.5em; color: #fff; }
    .ProseMirror h3 { font-size: 1.25rem; font-weight: bold; margin-bottom: 0.5em; color: #fff; }
    .ProseMirror ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1em; }
    .ProseMirror ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 1em; }
    .ProseMirror blockquote { border-left: 3px solid #3f3f46; padding-left: 1rem; color: #a1a1aa; font-style: italic; }
  </style>
<script type="importmap">

    "@tiptap/starter-kit": "https://esm.sh/@tiptap/starter-kit@2.2.4?external=react,react-dom",
    "@tiptap/extension-underline": "https://esm.sh/@tiptap/extension-underline@2.2.4?external=react,react-dom",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
